name: Mirror SDL2 upstream test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"   

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Clone SDL2 upstream (bare)
        run: |
          git clone --bare https://github.com/libsdl-org/SDL.git sdl2.git

      - name: Remove workflows from bare repo
        run: |
          cd sdl2.git
          # 安装 git-filter-repo
          pip install git-filter-repo
          # 删除 .github/workflows 目录及其所有历史
          git filter-repo --path .github/workflows --invert-paths --force
          
          # filter-repo 会删除 origin remote，需要重新添加
          git remote add origin https://github.com/libsdl-org/SDL.git

      - name: Push to org mirror
        run: |
          cd sdl2.git
          git push --mirror https://x-access-token:${{ secrets.MIRROR_PAT_TOKEN }}@github.com/org-foundation/mirrors-sdl2.git

      - name: Check gh CLI version
        run: gh --version

      - name: Sync releases from upstream
        env:
          # 注意：必须用 Personal Access Token，且有 repo 权限
          GH_TOKEN: ${{ secrets.MIRROR_PAT_TOKEN }}  # 不能用 GITHUB_TOKEN
        run: |
          # 修复1：--repo 使用 "owner/repo" 格式，不是完整 URL
          gh release list --repo libsdl-org/SDL --limit 100 > upstream_releases.txt
          
          # 修复2：mirror 仓库也需要正确的 token（已在 env 中）
          gh release list --repo org-foundation/mirrors-sdl2 --limit 100 > mirror_releases.txt || true
          
          while read line; do
            # 提取 tag 名（第一列）
            tag=$(echo "$line" | awk '{print $1}')
            
            # 跳过空行
            [ -z "$tag" ] && continue
            
            if ! grep -q "^$tag" mirror_releases.txt 2>/dev/null; then
              echo "Missing release: $tag, syncing..."
              
              # 下载 release assets
              gh release download "$tag" --repo libsdl-org/SDL --dir "./assets/$tag"
              
              # 创建 release（如果有 assets 就上传，没有就只创建）
              if [ -n "$(ls -A "./assets/$tag" 2>/dev/null)" ]; then
                gh release create "$tag" --repo org-foundation/mirrors-sdl2 \
                  --notes "Mirrored from upstream SDL2" \
                  "./assets/$tag/*"
              else
                gh release create "$tag" --repo org-foundation/mirrors-sdl2 \
                  --notes "Mirrored from upstream SDL2 (no assets)"
              fi
              
              rm -rf "./assets/$tag"
            fi
          done < upstream_releases.txt
